<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Método Janga — Gestão de Demandas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0C2340;
  --navy2:#042C53;
  --blue:#378ADD;
  --blue2:#185FA5;
  --bluelt:#85B7EB;
  --bluexlt:#E6F1FB;
  --white:#ffffff;
  --gray50:#F8F9FA;
  --gray100:#F1F3F5;
  --gray200:#E9ECEF;
  --gray400:#ADB5BD;
  --gray600:#6C757D;
  --gray800:#343A40;
  --green:#3B6D11;
  --greenlt:#EAF3DE;
  --amber:#854F0B;
  --amberlt:#FAEEDA;
  --red:#A32D2D;
  --redlt:#FCEBEB;
}
body{font-family:'Inter',sans-serif;background:#F0F4F8;min-height:100vh;color:var(--gray800);}

/* HEADER */
.header{background:var(--navy);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:14px;}
.logo{width:42px;height:42px;background:var(--blue2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#E6F1FB;letter-spacing:.02em;}
.header-info h1{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;color:#E6F1FB;letter-spacing:.01em;}
.header-info p{font-size:11px;color:var(--bluelt);margin-top:1px;}
.header-right{display:flex;align-items:center;gap:10px;}
.xp-pill{background:var(--blue2);color:#E6F1FB;font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;display:flex;align-items:center;gap:6px;}
.xp-star{color:#EF9F27;}
.btn-nova-global{background:var(--blue);color:#fff;font-size:12px;font-weight:500;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s;}
.btn-nova-global:hover{opacity:.9;}

/* METRICS */
.metrics-bar{background:var(--navy);border-bottom:1px solid rgba(255,255,255,.06);padding:.75rem 2rem;display:flex;align-items:center;gap:2rem;}
.metric{text-align:center;}
.metric .n{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#E6F1FB;}
.metric .l{font-size:10px;color:var(--bluelt);text-transform:uppercase;letter-spacing:.06em;margin-top:1px;}
.divider{width:1px;height:32px;background:rgba(255,255,255,.1);}
.progress-section{flex:1;display:flex;align-items:center;gap:12px;margin-left:1rem;}
.progress-section span{font-size:11px;color:var(--bluelt);white-space:nowrap;}
.bar-bg{flex:1;background:var(--navy2);border-radius:20px;height:6px;overflow:hidden;}
.bar-fill{background:var(--blue);height:6px;border-radius:20px;transition:width .4s ease;}
.pct{font-size:12px;font-weight:500;color:var(--blue);white-space:nowrap;min-width:48px;text-align:right;}

/* BADGES */
.badges-bar{background:#fff;border-bottom:1px solid var(--gray200);padding:.6rem 2rem;display:flex;align-items:center;gap:8px;overflow-x:auto;}
.badges-label{font-size:11px;color:var(--gray400);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;margin-right:4px;}
.badge{background:var(--gray100);border:1px solid var(--gray200);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--gray600);display:flex;align-items:center;gap:5px;white-space:nowrap;}
.badge.earned{background:var(--bluexlt);border-color:var(--blue2);color:var(--blue2);}
.badge.earned .bdot{background:var(--blue);}
.bdot{width:5px;height:5px;border-radius:50%;background:var(--gray400);}

/* BOARD */
.board-wrap{padding:1.5rem 2rem;overflow-x:auto;}
.board{display:grid;grid-template-columns:repeat(4,minmax(220px,1fr));gap:14px;min-width:880px;}

.col{background:var(--gray100);border-radius:12px;padding:12px;min-height:400px;display:flex;flex-direction:column;}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.col-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--gray800);}
.col-count{font-size:11px;color:var(--gray600);background:#fff;border:1px solid var(--gray200);border-radius:20px;padding:2px 9px;}
.col-accent{height:3px;border-radius:2px;margin-bottom:12px;}
.acc-todo{background:var(--gray400);}
.acc-prog{background:var(--blue);}
.acc-rev{background:#EF9F27;}
.acc-done{background:#639922;}

/* CARDS */
.cards-area{flex:1;}
.card{background:#fff;border:1px solid var(--gray200);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:grab;transition:border-color .15s, transform .1s;}
.card:hover{border-color:var(--blue2);}
.card:active{cursor:grabbing;}
.card.dragging{opacity:.4;transform:scale(.97);}
.card.drag-over{border-color:var(--blue);border-style:dashed;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--gray800);line-height:1.3;}
.card-del{background:none;border:none;cursor:pointer;color:var(--gray400);font-size:14px;line-height:1;padding:0;flex-shrink:0;opacity:0;transition:opacity .15s;}
.card:hover .card-del{opacity:1;}
.card-del:hover{color:var(--red);}
.card-perfil{font-size:10px;color:var(--blue);margin-bottom:8px;font-weight:500;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.avatar-wrap{display:flex;align-items:center;gap:6px;}
.avatar{width:22px;height:22px;border-radius:50%;background:var(--blue2);display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:600;flex-shrink:0;}
.card-resp{font-size:10px;color:var(--gray600);}
.card-prazo{font-size:10px;color:var(--gray400);}
.card-prazo.late{color:var(--red);font-weight:500;}

/* ADD FORM */
.add-btn{width:100%;background:transparent;border:1px dashed var(--gray300,#dee2e6);border-radius:10px;padding:9px;font-size:12px;color:var(--gray400);cursor:pointer;text-align:center;margin-top:4px;font-family:'Inter',sans-serif;transition:all .15s;}
.add-btn:hover{border-color:var(--blue);color:var(--blue);}
.add-form{background:#fff;border:1px solid var(--blue2);border-radius:10px;padding:12px;margin-top:6px;display:none;}
.add-form.open{display:block;}
.add-form input,.add-form select{width:100%;font-size:12px;font-family:'Inter',sans-serif;border:1px solid var(--gray200);border-radius:6px;padding:7px 10px;margin-bottom:7px;color:var(--gray800);background:#fff;outline:none;}
.add-form input:focus,.add-form select:focus{border-color:var(--blue);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.form-btns{display:flex;gap:6px;margin-top:4px;}
.btn-save{background:var(--blue);color:#fff;font-size:11px;font-weight:500;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-cancel{background:transparent;border:1px solid var(--gray200);color:var(--gray600);font-size:11px;padding:7px 12px;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:2rem;width:100%;max-width:480px;margin:1rem;}
.modal h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;color:var(--gray800);margin-bottom:1.25rem;}
.modal label{font-size:12px;color:var(--gray600);display:block;margin-bottom:4px;margin-top:10px;}
.modal input,.modal select,.modal textarea{width:100%;font-size:13px;font-family:'Inter',sans-serif;border:1px solid var(--gray200);border-radius:8px;padding:9px 12px;color:var(--gray800);background:#fff;outline:none;}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--blue);}
.modal textarea{height:80px;resize:none;}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-btns{display:flex;gap:8px;margin-top:1.25rem;}
.btn-modal-save{background:var(--blue);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;flex:1;}
.btn-modal-cancel{background:transparent;border:1px solid var(--gray200);color:var(--gray600);font-size:13px;padding:10px 16px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#E6F1FB;font-size:13px;padding:10px 20px;border-radius:20px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>

<script>
const STORAGE_KEY = 'metodo-janga-kanban-v1';
const avatars = {Rodolfo:'RD','Ana Luisa':'AL','Rodolfo + Ana Luisa':'R+A','Medeiros Marketing':'MM'};
let cards = [];
let nextId = 1;
let dragging = null;

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const data = JSON.parse(raw);
      cards = data.cards || [];
      nextId = data.nextId || cards.length + 1;
    } else {
      cards = [
        {id:1,col:'todo',titulo:'Diálogo gestão de equipe',perfil:'@metodojanga',resp:'Rodolfo + Ana Luisa',inicio:'',prazo:'2025-04-30'},
        {id:2,col:'prog',titulo:'Reels NRA Show Chicago',perfil:'@metodojanga',resp:'Rodolfo + Ana Luisa',inicio:'2025-05-01',prazo:'2025-05-19'},
        {id:3,col:'prog',titulo:'Carrossel top erros do restaurateur',perfil:'@rodolfodiniz',resp:'Medeiros Marketing',inicio:'2025-04-22',prazo:'2025-04-28'},
        {id:4,col:'rev',titulo:'Carrossel bastidores do método',perfil:'@analuisadiniz',resp:'Ana Luisa',inicio:'2025-04-20',prazo:'2025-04-25'},
        {id:5,col:'done',titulo:'Monólogo sobre precificação',perfil:'@rodolfodiniz',resp:'Rodolfo',inicio:'2025-04-15',prazo:'2025-04-20'},
        {id:6,col:'done',titulo:'Stories semana 3 — Abril',perfil:'@metodojanga',resp:'Medeiros Marketing',inicio:'2025-04-14',prazo:'2025-04-18'},
      ];
      nextId = 7;
      save();
    }
  } catch(e){ cards=[]; nextId=1; }
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({cards, nextId}));
}

function today(){ return new Date().toISOString().split('T')[0]; }
function fmt(s){ if(!s)return ''; const[y,m,d]=s.split('-'); return `${d}/${m}`; }
function isLate(s){ return s && s < today(); }

function render(){
  ['todo','prog','rev','done'].forEach(col=>{
    const these = cards.filter(c=>c.col===col);
    document.getElementById('cards-'+col).innerHTML = these.map(c=>`
      <div class="card" id="card-${c.id}" draggable="true"
        ondragstart="onDragStart(event,${c.id})"
        ondragend="onDragEnd()"
        ondragover="onOver(event)"
      >
        <div class="card-top">
          <div class="card-title">${c.titulo}</div>
          <button class="card-del" onclick="deletar(${c.id})" title="Remover">×</button>
        </div>
        <div class="card-perfil">${c.perfil}</div>
        <div class="card-footer">
          <div class="avatar-wrap">
            <div class="avatar">${avatars[c.resp]||'?'}</div>
            <span class="card-resp">${c.resp}</span>
          </div>
          ${c.prazo?`<span class="card-prazo${isLate(c.prazo)?' late':''}">${isLate(c.prazo)?'Atrasado: ':'Prazo: '}${fmt(c.prazo)}</span>`:''}
        </div>
      </div>
    `).join('');
    document.getElementById('cnt-'+col).textContent = these.length;
  });
  updateMetrics();
  updateBadges();
  save();
}

function updateMetrics(){
  const total = cards.length;
  const prog = cards.filter(c=>c.col==='prog').length;
  const rev = cards.filter(c=>c.col==='rev').length;
  const done = cards.filter(c=>c.col==='done').length;
  document.getElementById('m-total').textContent = total;
  document.getElementById('m-prog').textContent = prog;
  document.getElementById('m-rev').textContent = rev;
  document.getElementById('m-done').textContent = done;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('bar').style.width = pct+'%';
  document.getElementById('pct').textContent = done+' de '+total;
  const pts = done*100 + rev*30 + prog*10;
  const nivel = pts>=1000?'Voando':pts>=400?'Em Ritmo':'Iniciante';
  document.getElementById('xp-label').textContent = pts+' pts — '+nivel;
  const now = new Date();
  document.getElementById('mes-label').textContent = now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
}

function updateBadges(){
  const done = cards.filter(c=>c.col==='done').length;
  const late = cards.filter(c=>isLate(c.prazo)&&c.col!=='done').length;
  toggle('b1', done>=1);
  toggle('b2', done>=5);
  toggle('b3', done>=10);
  toggle('b4', late===0 && cards.length>0);
  const total=cards.length;
  toggle('b5', total>0 && done===total);
}

function toggle(id, on){
  const el=document.getElementById(id);
  if(on) el.classList.add('earned'); else el.classList.remove('earned');
}

function onDragStart(e,id){
  dragging=id;
  setTimeout(()=>document.getElementById('card-'+id)?.classList.add('dragging'),0);
}
function onDragEnd(){
  if(dragging) document.getElementById('card-'+dragging)?.classList.remove('dragging');
  dragging=null;
}
function onOver(e){ e.preventDefault(); }
function onDrop(e,col){
  e.preventDefault();
  if(dragging===null) return;
  const c=cards.find(x=>x.id===dragging);
  if(c){ c.col=col; render(); toast('Card movido para '+colLabel(col)); }
  dragging=null;
}

function colLabel(col){ return {todo:'A fazer',prog:'Em produção',rev:'Aguardando aprovação',done:'Entregue'}[col]; }

function toggleForm(col){
  const f=document.getElementById('form-'+col);
  f.classList.toggle('open');
  if(f.classList.contains('open')) document.getElementById('t-'+col).focus();
}

function addCard(col){
  const t=document.getElementById('t-'+col).value.trim();
  if(!t){ toast('Digite um título'); return; }
  cards.push({
    id:nextId++,col,
    titulo:t,
    perfil:document.getElementById('p-'+col).value||'@metodojanga',
    resp:document.getElementById('r-'+col).value,
    inicio:document.getElementById('di-'+col).value,
    prazo:document.getElementById('dp-'+col).value
  });
  document.getElementById('t-'+col).value='';
  document.getElementById('p-'+col).value='';
  document.getElementById('di-'+col).value='';
  document.getElementById('dp-'+col).value='';
  document.getElementById('form-'+col).classList.remove('open');
  render();
  toast('Demanda adicionada');
}

function deletar(id){
  if(!confirm('Remover esta demanda?')) return;
  cards=cards.filter(c=>c.id!==id);
  render();
  toast('Demanda removida');
}

function abrirModal(){ document.getElementById('modal-overlay').classList.add('open'); }
function fecharModal(e){
  if(!e||e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}
function salvarModal(){
  const t=document.getElementById('m-titulo').value.trim();
  if(!t){ toast('Digite um título'); return; }
  cards.push({
    id:nextId++,
    col:document.getElementById('m-col').value,
    titulo:t,
    perfil:document.getElementById('m-perfil').value,
    resp:document.getElementById('m-resp').value,
    inicio:document.getElementById('m-inicio').value,
    prazo:document.getElementById('m-prazo').value
  });
  document.getElementById('m-titulo').value='';
  document.getElementById('m-inicio').value='';
  document.getElementById('m-prazo').value='';
  document.getElementById('modal-overlay').classList.remove('open');
  render();
  toast('Demanda criada');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

load();
render();
</script>
</body>
</html>
